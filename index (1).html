<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Review & Spin Reward</title>
<link rel="stylesheet" href="styles.css">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f4f4;
  padding: 40px;
}
h1 {
  color: #333;
}
button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin: 10px;
}
button:disabled {
  background: #ccc !important;
  cursor: not-allowed;
}
.review {
  background: #ff3b3b;
  color: white;
}
.submit {
  background: #28a745;
  color: white;
}
.spin {
  background: #007bff;
  color: white;
}
#spinArea {
  display: none;
  margin-top: 30px;
  position: relative;
}
#result {
  font-size: 24px;
  margin-top: 20px;
  font-weight: bold;
  color: #222;
}
#wheel {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  margin: 20px auto;
  border: 10px solid #333;
  background: conic-gradient(
    red 0deg 72deg,
    yellow 72deg 144deg,
    green 144deg 216deg,
    blue 216deg 288deg,
    orange 288deg 360deg
  );
  transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
}
.label {
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: 0 0;
  font-size: 14px;
  font-weight: bold;
  color: white;
}

/* Arrow pointer above wheel */
#pointer {
  width: 0; 
  height: 0; 
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 30px solid #333;
  margin: 0 auto;
  position: relative;
  top: -30px;
  z-index: 10;
}
</style>

<script>
function openReview() {
  window.open("https://www.google.com/maps/search/?api=1&query=Romeo+Lane+Indore", "_blank");
}

function unlockSpin() {
  document.getElementById("spinArea").style.display = "block";
  document.getElementById("spinBtn").disabled = false;
}

let spinning = false;

function spinWheel() {
  if(spinning) return; // Prevent multiple spins simultaneously

  spinning = true;

  const wheel = document.getElementById("wheel");
  const resultText = document.getElementById("result");
  const rewards = [
    "Free Dessert 🍰",
    "10% Discount 🎉",
    "Free Drink 🥤",
    "20% Discount 🔥",
    "Better Luck Next Time 🙂"
  ];

  // Generate rotation degrees - at least 5 spins (5*360 =1800) + random angle 0-360
  const spins = 5;
  const randomDegree = Math.floor(Math.random() * 360);
  const totalDeg = spins * 360 + randomDegree;

  wheel.style.transition = 'transform 4s cubic-bezier(0.33, 1, 0.68, 1)';
  wheel.style.transform = `rotate(${totalDeg}deg)`;

  // After transition ends, calculate result based on final angle
  wheel.addEventListener('transitionend', function handler() {
    spinning = false;
    // Actual degree within 0-360
    const actualDeg = totalDeg % 360;

    // Each segment is 72 degrees: 0-72 red, 72-144 yellow, ...
    // But wheel rotates clockwise, so pointer is fixed at top (0 deg).
    // We calculate result based on from actualDeg to 0deg pointer.
    // Since rotation is clockwise, we calculate which segment the pointer (0deg) points to on wheel.

    // Calculate segment index
    // The pointer is at 0deg, so we consider 360 - actualDeg to map
    let pointerPos = (360 - actualDeg) % 360;
    let segmentIndex = Math.floor(pointerPos / 72);

    resultText.innerHTML = "You Won: " + rewards[segmentIndex];

    wheel.removeEventListener('transitionend', handler);
  });
}


</script>

</head>
<body>
<h1>Leave a Google Review & Win 🎁</h1>
<p>Give us a Google review and spin the wheel to win rewards!</p>

<button class="review" onclick="openReview()">Write Review on Google</button>
<br><br>

<button onclick="unlockSpin()" class="submit">
I Have Submitted My Review
</button>

<div id="spinArea">
  

  <h2>Spin & Win 🎡</h2>

  <div id="wheel" style="position:relative;">

<div id="pointer">⬇</div>

<div class="label" style="transform: rotate(36deg) translate(80px) rotate(-36deg);">Dessert</div>
<div class="label" style="transform: rotate(108deg) translate(80px) rotate(-108deg);">10% Off</div>
<div class="label" style="transform: rotate(180deg) translate(80px) rotate(-180deg);">Drink</div>
<div class="label" style="transform: rotate(252deg) translate(80px) rotate(-252deg);">20% Off</div>
<div class="label" style="transform: rotate(324deg) translate(80px) rotate(-324deg);">Try Again</div>

</div>

  <button id="spinBtn" class="spin" onclick="spinWheel()" disabled>SPIN</button>

  <p id="result"></p>
</div>

<br><br>

</body>
</html>
